<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desarrollo de Habilidades</title>
    <link rel="stylesheet" href="./css/usuario.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
</head>
<body class="bg-habilidades-fondo">
    <header class="header-habilidades d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <div class="d-flex justify-content-center align-items-center me-3" style="width: 50px; height: 50px; background-color: #88c8eb; border-radius: 50%;">
          <i class="bi bi-person-gear text-white" style="font-size: 30px;"></i>
        </div>
        <h4 class="mb-0 text-dark fw-bold" style="font-size: 18px;">DESARROLLO DE HABILIDADES</h4>
      </div>
      <div class="pill-usuario d-flex align-items-center">
        <span class="me-2 fw-bold" style="font-size: 12px; color: #000;">Usuario</span>
        <i class="bi bi-person-circle fs-4" style="color: #005689;"></i>
      </div>
    </header>

    <main class="container" style="margin-top: 80px;">
      <div class="row justify-content-center gx-4 gx-lg-5 gy-4">
        
        <div class="col-12 col-md-6 col-lg-5 d-flex">
          <div class="card card-hab w-100 h-100">
            <div class="card-body p-5 d-flex flex-column">
              <h5 class="mb-4 text-dark" style="font-size: 20px;">Habilidades Blandas</h5>
              
              <div class="texto-gris-hab mb-4">
                <p class="mb-1">Desarrolla competencias como:</p>
                <p class="mb-1">Liderazgo</p>
                <p class="mb-1">Comunicación efectiva</p>
                <p class="mb-1">Trabajo en equipo</p>
                <p class="mb-0">Resolución de problemas</p>
              </div>
              
              <div class="text-center mt-auto">
                <button type="button" class="btn btn-hab">Desarrollar</button>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-5 d-flex">
          <div class="card card-hab w-100 h-100">
            <div class="card-body p-5 d-flex flex-column">
              <h5 class="mb-4 text-dark" style="font-size: 20px;">Competencias Técnicas</h5>
              
              <div class="texto-gris-hab mb-4">
                <p>Recursos para mejorar habilidades técnicas específicas según tu área profesional</p>
              </div>
              
              <div class="text-center mt-auto">
                <button type="button" class="btn btn-hab">Aprender</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>

    <a href="index.html" class="text-dark position-fixed" style="bottom: 30px; left: 30px; text-decoration: none;">
      <i class="bi bi-box-arrow-left fw-bold" style="font-size: 40px;"></i>
    </a>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
</body>
</html>
