<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de sesión | Job-Match</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/usuario-monse.css">
</head>
<body class="bg-light usuario">

  <div class="container-fluid vh-100">
    <div class="row h-100">

      <!-- Panel izquierdo -->
      <div class="col-md-6 d-flex flex-column justify-content-center align-items-center text-center text-white left-panel">
        <div class="mb-3">
          <img src="./multimedia/logoUsuarios.png" id="Logo" class="img-fluid" style="width: 250px;">
        </div>
      </div>

      <!-- Panel derecho -->
      <div class="col-md-6 d-flex justify-content-center align-items-center bg-white">
        <div class="w-75">
          <h3 class="fw-bold mb-3 text-center" style="color: #5B2583;">Inicio de sesión</h3>

          <!-- Pestañas de tipo -->
          <div class="d-flex justify-content-center gap-3 mb-4">
            <button class="btn-tipo activo" onclick="cambiarTipo(this, 'usuario')">USUARIO</button>
            <button class="btn-tipo" onclick="cambiarTipo(this, 'empresa')">EMPRESA</button>
            <button class="btn-tipo" onclick="window.location.href='../admin/login.html'">ADMINISTRADOR</button>
          </div>

          <!-- Formulario -->
          <div class="mb-3">
            <label for="email" class="form-label fw-bold">Correo electrónico</label>
            <input type="email" id="email" class="form-control rounded-4" placeholder="Ingresa tu correo">
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-bold">Contraseña</label>
            <input type="password" id="password" class="form-control rounded-4" placeholder="Ingresa tu contraseña">
            <div class="text-start mt-1">
              <a href="Restablecer-contraseña.html" class="small text-decoration-none text-secondary">¿Olvidaste tu contraseña?</a>
            </div>
          </div>

          <div>
            <button type="button" class="btn w-50 d-block mx-auto rounded-4"
              style="background-color:#5B2583; color:#fff; border:none;"
              onclick="login()">
              Ingresar
            </button>
          </div>

          <div class="text-center mt-3">
            <span class="text-dark fw-bold">¿Eres nuevo?</span>
            <a id="link-crear-cuenta" href="Registro-usuarios.html"
              class="fw-semibold text-decoration-underline ms-1" style="color: #5B2583;">
              Crea una cuenta
            </a>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="./js/usuario-monse.js"></script>
</body>
</html>
