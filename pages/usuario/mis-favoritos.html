<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Favoritos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body style="background-color: #d8cee8;"> 

<div class="container p-4">

  <!-- Botón volver -->
  <div>
    <a href="index.html">
      <i class="bi bi-arrow-left-circle fs-2 text-dark"></i>
    </a>
  </div>

  <!-- Navegación -->
  <div class="d-flex justify-content-center my-3">
    <div class="d-flex bg-white border rounded-4 shadow-sm px-2 py-1" style="max-width:600px;">
      
      <button class="btn" onclick="window.location.href='Perfil-usuario.html'">
        <i class="bi bi-person me-2"></i> Mi perfil
      </button>

      <button class="btn" onclick="window.location.href='mis-postulaciones.html'">
        <i class="bi bi-hand-index-thumb me-2"></i> Mis Postulaciones
      </button>

      <button class="btn text-dark" style="background-color:#a988b3;">
        <i class="bi bi-heart me-2"></i> Mis Favoritos
      </button>
    </div>
  </div>

  <!-- Título -->
  <div class="d-flex justify-content-center">
    <div style="width: 40%;">
      <button class="btn rounded-4 px-4 mb-4" style="border: 1px solid #000; background-color: white;">
        Mis Favoritos
      </button>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="row justify-content-center">

    <!-- LISTA -->
    <div class="col-md-6">
      <div id="lista-favoritos"
           class="bg-white rounded-4 p-4"
           style="border:1px solid #000; min-height:350px;">
      </div>
    </div>

    <!-- PANEL -->
    <div class="col-12 col-md-3">
      <div class="bg-white rounded-4 p-4 text-center" style="border:1px solid #000;">
        <img src="./multimedia/favoritos1.png" width="150px">
        <div class="mt-4">
          <button class="btn rounded-pill px-4 py-2"
                  style="background-color:#a988b3;"
                  onclick="window.location.href='index.html'">
            Explorar Ofertas
          </button>
        </div>
      </div>
    </div>

  </div>

</div>
<script src="./js/monse-BD.js"></script>
<script src="./js/usuario-monse.js"></script>
</body>
</html>
