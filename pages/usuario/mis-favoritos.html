<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Favoritos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/usuario.css">
  </head>

  <body class="bg-seccion-usuario">
    <div class="container p-4">
      <div>
        <a href="index.html" class="text-dark"
          ><i class="bi bi-arrow-left-circle fs-2"></i
        ></a>
      </div>

      <div class="d-flex justify-content-center my-3">
        <div class="d-flex pill-nav-container w-100">
          <button
            class="btn flex-fill btn-pill-custom d-flex align-items-center justify-content-center"
            onclick="window.location.href = 'Perfil-usuario.html'"
          >
            <i class="bi bi-person me-2"></i> Mi perfil
          </button>

          <button
            class="btn flex-fill btn-pill-custom d-flex align-items-center justify-content-center"
            onclick="window.location.href = 'mis-postulaciones.html'"
          >
            <i class="bi bi-hand-index-thumb me-2"></i> Mis Postulaciones
          </button>

          <button
            class="btn flex-fill btn-pill-custom btn-pill-active d-flex align-items-center justify-content-center text-dark"
            onclick="window.location.href = 'mis-favoritos.html'"
          >
            <i class="bi bi-heart me-2"></i> Mis Favoritos
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-center">
        <div class="d-flex justify-content-start" style="width: 40%">
          <button class="btn btn-outline-dark-custom px-4 mb-4">
            Mis Favoritos
          </button>
        </div>
      </div>

      <div class="container py-2">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <div
              class="card-usuario-custom p-5 d-flex flex-column justify-content-start"
              style="min-height: 350px"
            >
              <div class="card-usuario-custom p-3 mb-3">
                <div class="d-flex justify-content-between align-items-start">
                  <div>
                    <h5 class="fw-bold mb-3">Cajero Administrador</h5>
                    <p class="text-secondary mb-3">
                      Deposito Universal, SA DE CV
                    </p>
                    <p class="text-secondary mb-3">Santa Ana, Santa Ana</p>
                  </div>
                  <img src="./multimedia/heart.png" style="width: 55px" />
                </div>
                <div class="text-end">
                  <button
                    class="btn border-0 rounded-4 px-4 btn-pill-active fw-bold"
                  >
                    Postularme
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-3 mb-4">
            <div
              class="card-usuario-custom p-4 text-center"
              style="min-height: 350px"
            >
              <img src="./multimedia/favoritos1.png" style="width: 150px" />
              <div class="mt-4">
                <button
                  class="btn border-0 rounded-pill px-4 py-2 btn-pill-active fw-bold"
                >
                  Explorar Ofertas
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="./js/usuario.js"></script>
  </body>
</html>
