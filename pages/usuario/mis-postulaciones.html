<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Postulaciones</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/usuario.css">
  </head>

  <body class="bg-seccion-usuario">
    <div class="container p-4">
      <div>
        <a href="index.html" class="text-dark"
          ><i class="bi bi-arrow-left-circle fs-2"></i
        ></a>
      </div>

      <div class="d-flex justify-content-center my-3">
        <div class="d-flex pill-nav-container w-100">
          <button
            class="btn flex-fill btn-pill-custom d-flex align-items-center justify-content-center"
            onclick="window.location.href = 'Perfil-usuario.html'"
          >
            <i class="bi bi-person me-2"></i> Mi perfil
          </button>

          <button
            class="btn flex-fill btn-pill-custom btn-pill-active-alt d-flex align-items-center justify-content-center text-dark"
            onclick="window.location.href = 'mis-postulaciones.html'"
          >
            <i class="bi bi-hand-index-thumb me-2"></i> Mis Postulaciones
          </button>

          <button
            class="btn flex-fill btn-pill-custom d-flex align-items-center justify-content-center"
            onclick="window.location.href = 'mis-favoritos.html'"
          >
            <i class="bi bi-heart me-2"></i> Mis Favoritos
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-center">
        <div class="d-flex justify-content-start" style="width: 40%">
          <button class="btn btn-outline-dark-custom px-4 mb-4">
            Mis postulaciones
          </button>
        </div>
      </div>

      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <div
              class="card-usuario-custom p-4 d-flex align-items-center justify-content-between"
            >
              <div class="text-center" style="max-width: 55%">
                <h5 class="fw-bold mb-2">
                  Aún no te has postulado a ninguna vacante
                </h5>
                <p class="mb-4">
                  Aquí aparecerán todas las ofertas a las que te hayas
                  postulado.
                </p>
                <button
                  class="btn text-dark rounded-pill px-4 fw-bold btn-pill-active-alt"
                >
                  Explorar Ofertas
                </button>
              </div>
              <div class="text-center">
                <img
                  src="./multimedia/postulaciones.png"
                  alt="Postulaciones"
                  class="img-fluid"
                  style="max-width: 200px"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="./js/usuario-monse.js"></script>
  </body>
</html>
