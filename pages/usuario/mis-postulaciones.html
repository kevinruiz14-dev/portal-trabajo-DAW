<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Postulaciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body style="background-color: #d8cee8;"> 

  <div class="container p-4">
    <div>
      <i class="bi bi-arrow-left-circle fs-2"></i>
    </div>

    <div class="d-flex justify-content-center my-3">
      <div class="d-flex bg-white border rounded-4 shadow-sm px-2 py-1" style="max-width:600px;">
        
        <button class="btn flex-fill rounded-4 d-flex align-items-center justify-content-center" style="color:#000;">
          <i class="bi bi-person me-2"></i> Mi perfil
        </button>

        <button class="btn flex-fill rounded-4 d-flex align-items-center justify-content-center text-dark" 
          style="background-color:#bfa2db;">
          <i class="bi bi-hand-index-thumb me-2"></i> Mis Postulaciones
        </button>

        <button class="btn flex-fill rounded-4 d-flex align-items-center justify-content-center" style="color:#000;">
          <i class="bi bi-heart me-2"></i> Mis Favoritos
        </button>
      </div>
    </div>

    <div class="d-flex justify-content-center">
      <div class="d-flex justify-content-start" style="width: 40%;">
        <button class="btn rounded-4 px-4 mb-4" style="border: 1px solid #000; background-color: white;">
          Mis postulaciones
        </button>
      </div>
    </div>

    <div class="container">
    <div class="row justify-content-center">
    <div class="col-md-6">
      
      <div class="bg-white rounded-4 p-4 d-flex align-items-center justify-content-between" 
           style="border: 1px solid #000;">
        
        <div class="text-center " style="max-width: 55%;">
          <h5 class="fw-bold mb-2">Aún no te has postulado a ninguna vacante</h5>
          <p class="mb-4">Aquí aparecerán todas las ofertas a las que te hayas postulado.</p>
          <button class="btn  btn text-dark rounded-pill px-4 fw-bold" style="background-color:#bfa2db;">
            Explorar Ofertas
          </button>
        </div>

        <div class="text-center">
          <img src="./multimedia/postulaciones.png" alt="Postulaciones" 
               class="img-fluid" style="max-width: 200px;">
        </div>

      </div>
    </div>
  </div>
</div>
    <script src="./js/usuario-monse.js"></script>
  </body>
</html>
