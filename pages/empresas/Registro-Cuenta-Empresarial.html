<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Empresarial</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .bg-morado {
            background-color: #5b5f97;
        }
        .btn-morado {
            background-color: #5b5f97;
        }
        .text-purple {
            color: #5b5f97;
        }
    </style>
</head>
<body class="bg-morado p-4  d-flex align-items-center">

    <div class="container">
        <div class="row">
            <!-- Tarjeta del formulario -->
            <div class="col-lg-6 col-md-6">
                <div class="bg-white rounded-4 p-5">
                    <!-- LOGO Y TITULO -->
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="bg-white rounded-3 p-2" >
                            <img src="./multimedia/Logo1.png" style="width: 80px; height: 60px;">
                        </div>
                        <h5 class="text-purple fw-semibold mb-0">Registro de cuenta empresarial</h5>
                    </div>

                    <form>

                        <div class="row mb-2">
                            <div class="col-6">
                                <input type="text" class="form-control form-control border-dark" placeholder="Nombres y apellidos">
                            </div>
                            <div class="col-6">
                                <input type="text" class="form-control form-control border-dark" placeholder="Teléfono">
                            </div>
                        </div>

                        <div class="row mb-2">
                            <div class="col-6">
                                <input type="email" class="form-control form-control border-dark" placeholder="Correo de acceso">
                            </div>
                            <div class="col-6">
                                <input type="password" class="form-control form-control border-dark" placeholder="Contraseña">
                            </div>
                        </div>

                        <div class="row mb-2">
                            <div class="col-6">
                                <input type="text" class="form-control form-control border-dark" placeholder="Nombre de la empresa">
                            </div>
                            <div class="col-6">
                                <input type="text" class="form-control form-control border-dark" placeholder="Razón social">
                            </div>
                        </div>

                        <div class="row mb-2">
                            <div class="col-6">
                                <select class="form-select form-select border-dark">
                                    <option>País</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <input type="text" class="form-control form-control border-dark" placeholder="NIT">
                            </div>
                        </div>

                        <div class="row mb-2">
                            <div class="col-6">
                                <select class="form-select form-select border-dark">
                                    <option>Departamento</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <select class="form-select form-select border-dark">
                                    <option>Ciudad</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-2">
                            <div class="col-6">
                                <select class="form-select form-select border-dark">
                                    <option>Selecciona el sector</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <select class="form-select form-select border-dark">
                                    <option>Nº de trabajadores</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-6">
                                <select class="form-select form-select border-dark">
                                    <option>Nº de vacantes anuales</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-control form-control-sm border-dark d-flex align-items-center">
                                    <i class="fa-solid fa-upload me-2"></i>
                                    <span class="text-muted">Adjuntar registro fiscal</span>
                                    <input type="file" class="d-none">
                                </label>
                            </div>
                        </div>
                      <div class="d-flex justify-content-center">
                        <button type="button" class="btn btn-morado text-white rounded-pill px-4 py-2 border-0">
                           Crear cuenta
                        </button>
                      </div>
                    </form>
                </div>

                
            </div>

            <!-- Lado derecho con logo -->
            <div class="col-lg-6 col-md-6 d-flex flex-column justify-content-center align-items-center">
                <div class="text-center">
                    <img src="./multimedia/logo2.png" class="img-fluid" style="max-width: 500px;">
                </div>
            </div>

            

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
