<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobMatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#5B5F97;">
  <div class="container">

    <a class="navbar-brand" href="#">
        <img src="img/logo.jpg" alt="Logo" height="80">
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link active" href="#"><strong>Inicio</strong></a></li>
        <li class="nav-item"><a class="nav-link" href="#"><strong>Reclutamiento</strong></a></li>
        <li class="nav-item"><a class="nav-link" href="#"><strong>Informes y pagos</strong></a></li>
      </ul>

      <!-- PERFIL -->
      <div class="d-flex align-items-center rounded-pill px-2 py-1 gap-2" style="background-color: #A3A8D3;">

        <button class="btn position-relative border-0 text-white">
          <i class="bi bi-bell"></i>
          <span class="position-absolute top-0 start-100 translate-middle badge bg-danger rounded-pill">2</span>
        </button>

        <div style="width:1px; height:25px; background-color:white;"></div>

        <button class="btn border-0 text-white">
          <strong>El Sabor de Mamá</strong>
        </button>

      </div>

    </div>
  </div>
</nav>


<!-- OPCIONES -->
<div class="container mt-4 border border-dark rounded p-3" style="background-color: #ECECFA;">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-center border rounded p-3">

        <button class="btn"> <strong>Mis ofertas </strong></button>
        <button class="btn fon"><strong>Publicar oferta </strong></button>
        <button class="btn btn-secondary rounded-pill px-4" style="background-color: #A3A8D3; font-weight: bold; color: black;">Buscar CV</button>

      </div>
    </div>
  </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="container text-center mt-5">

  <h3 class="" style="color: #570B6F; font-weight: bold;">
    ¡Explora currículums según el perfil que necesitas!
  </h3>

  <!-- BUSCADOR -->
  <div class="input-group border border-dark rounded-pill overflow-hidden">

  <span class="input-group-text bg-white border-0">
    <i class="bi bi-briefcase" style="color: #7E3A93;"></i>
  </span>
  <input type="text" class="form-control border-0" placeholder="Ej: Administrador, secretaria">

  <div style="width:1px; height:25px; background-color:black;"></div>

  <span class="input-group-text bg-white border-0">
    <i class="bi bi-geo-alt" style="color: #7E3A93;"></i>
  </span>
  <input type="text" class="form-control border-0" placeholder="Ej: Santa Ana, Chalchuapa">

</div>

  <!-- BOTÓN -->
  <div class="mt-4">
    <button class="btn btn-primary rounded-pill px-5" style="background-color: #5B5F97;">
      Explorar
    </button>
  </div>

</div>

<!-- 🔹 RESULTADOS -->
<div class="container mt-5">

  <h5 class="fw-bold text-start">RESULTADOS:</h5>

  <!-- CONTENEDOR VACÍO -->
  <div id="listaResultados" class="mt-3"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
