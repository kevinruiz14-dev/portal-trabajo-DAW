<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="vh-100 d-flex justify-content-center align-items-center text-white" style="background: linear-gradient(180deg,#2d2f7f,#140c2e);">
    <div class="text-center" style="width:320px">
        <h2 class="mb-5 fw-semibold">Inicio de sesión</h2>
        <form id="loginForm" onsubmit="login(event)">
            <div class="input-group mb-3">
                <span class="input-group-text bg-transparent text-white border-white rounded-start-pill">
                    <i class="bi bi-person"></i>
                </span>
                <input type="text" id="username" class="form-control bg-transparent text-white border-white rounded-end-pill" placeholder="Usuario" required>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text bg-transparent text-white border-white rounded-start-pill">
                    <i class="bi bi-key"></i>
                </span>
                <input type="password" id="password" class="form-control bg-transparent text-white border-white rounded-end-pill" placeholder="Contraseña" required>
            </div>
            <div class="mb-4">
                <a href="#" class="text-decoration-none text-light small">¿Olvidaste tu contraseña?</a>
            </div>
            <button type="submit" class="btn rounded-pill px-4" style="background:#7c6cff; color:white;">Ingresar</button>
        </form>
        
        <div class="mt-5 small text-light">
            Cerrar sesión
        </div>
    </div>
    <script>
        function login(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === '' || password === '') {
                alert('Por favor, completa todos los campos.');
                return;
            }
            
            window.location.href = "pages/dashboard.html";
        }
    </script>
</body>
</html>
